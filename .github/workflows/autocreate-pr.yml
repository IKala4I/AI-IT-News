name: Auto-create PR for digest branches
on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Create PR
        run: |
          TITLE=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" --jq '.commit.message | split("\n")[0]')
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "${{ github.ref_name }}" \
            --base main \
            --title "$TITLE" \
            --body "Auto-generated digest PR"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
