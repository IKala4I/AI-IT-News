name: Auto-create and merge PR for digest branches
on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-and-merge-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Create and merge PR
        run: |
          TITLE=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" --jq '.commit.message | split("\n")[0]')
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "${{ github.ref_name }}" \
            --base main \
            --title "$TITLE" \
            --body "Auto-generated digest PR"
          gh pr merge "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
